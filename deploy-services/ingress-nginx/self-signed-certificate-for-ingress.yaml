# self-signed-root-ca-issuer.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: external-selfsigned-root-ca-issuer
spec:
  selfSigned: {}

---
# external-selfsigned-ca-certificate.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: external-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: external-root-ca
  secretName: external-root-ca-secret
  issuerRef:
    name: external-selfsigned-root-ca-issuer
    kind: ClusterIssuer

---
# external-ca-issuer.yaml
apiVersion: cert-manager/v1
kind: ClusterIssuer
metadata:
  name: external-ca-issuer
spec:
  ca:
    secretName: external-root-ca-secret

---
# trust-bundle.yaml
# apiVersion: trust.cert-manager.io/v1alpha1
# kind: Bundle
# metadata:
#   name: external-ca-bundle
# spec:
#   sources:
#     - secret:
#         name: external-root-ca-secret
#         key: ca.crt
#   target:
#     configMap:
#       key: "external-ca.crt"

---
# external-certificate.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: external-ingress-certificate
  namespace: ingress-nginx
spec:
  secretName: external-ingress-tls
  issuerRef:
    name: external-ca-issuer
    kind: ClusterIssuer
  ipAddresses:
    # 請將 k0s 叢集會使用的「外部 IP」寫到下方的陣列中
    - 192.168.0.1
  usages:
    - digital signature
    - key encipherment
    - server auth

